spring.application.name=eFacturador
# Configuraci?n de la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:54321/db_sigme
spring.datasource.username=sigme
spring.datasource.password=Epdlmede2*
spring.datasource.driver-class-name=org.postgresql.Driver
# Dialecto de Hibernate para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Estrategia de actualizaci?n del esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update
# Mostrar consultas SQL en la consola (opcional)
spring.jpa.show-sql=true
# Formatear las consultas SQL en la consola (opcional)
spring.jpa.properties.hibernate.format_sql=true
# Mostrar los valores de los par?metros bind
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.braintech.eFacturador.dao.inventario=DEBUG
dgii.api.url=https://efacturacion-nonprod-gaczaxhtfpftdpf8.eastus-01.azurewebsites.net
#dgii.api.url=https://facturacion-electronica-api-prod.sigmeapps.net

# Brevo Transactional Email API (https://app.brevo.com → SMTP & API → API Keys)
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=${BREVO_FROM_EMAIL:cambiocontrasena@sigmeapps.net}
brevo.from.name=eFacturador

# Jackson: incluir campos sin @JsonView cuando una vista está activa
spring.jackson.mapper.default-view-inclusion=true

# Multipart: tamaño máximo para upload de recibos de entrega
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# Storage LOCAL: directorio y URL base del servidor (usado cuando storageTipo = LOCAL)
app.storage.local.base-path=${APP_LOCAL_STORAGE_PATH:/uploads/recibos}
app.storage.local.base-url=${APP_LOCAL_STORAGE_URL:}

# ── Helpdesk storage ──────────────────────────────────────────────────────────
# Opciones: LOCAL | AZURE | S3
helpdesk.storage.provider=LOCAL
helpdesk.storage.local.base-path=${HELPDESK_LOCAL_PATH:/var/uploads/helpdesk}

